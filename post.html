<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post — ahadiwasti</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="back">← Back to learning log</a>
    </div>
  </header>

  <main>
    <article id="post-content">Loading...</article>
  </main>

  <footer>
    <p>Built in public · <a href="https://github.com/ahadiwasti/ahadiwasti.github.io" target="_blank">View source</a></p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    if (file) {
      fetch(file)
        .then(r => r.text())
        .then(md => {
          document.getElementById("post-content").innerHTML = marked.parse(md);
        })
        .catch(() => {
          document.getElementById("post-content").innerHTML = "<p>Post not found.</p>";
        });
    }
  </script>
</body>
</html>
