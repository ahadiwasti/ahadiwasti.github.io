<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post — ahadiwasti</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="back">← Back to learning log</a>
    </div>
  </header>

  <main>
    <article id="post-content">Loading...</article>
  </main>

  <footer>
    <p>Built in public · <a href="https://github.com/ahadiwasti/ahadiwasti.github.io" target="_blank">View source</a></p>
  </footer>

  <script>
  const params = new URLSearchParams(window.location.search);
  const url = params.get("url");
  if (url) {
    fetch(decodeURIComponent(url))
      .then(r => r.text())
      .then(md => {
        // Parse frontmatter
        const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n/);
        const fm = {};
        if (fmMatch) {
          fmMatch[1].split("\n").forEach(line => {
            const [key, ...val] = line.split(":");
            if (key && val) fm[key.trim()] = val.join(":").trim();
          });
        }

        // Strip frontmatter from content
        const content = md.replace(/^---\n[\s\S]*?\n---\n/, "");

        // Build breadcrumb
        const parts = [fm.category, fm.subcategory, ...(fm.breadcrumb ? fm.breadcrumb.split("/") : [])].filter(Boolean);
        const breadcrumb = parts.map((p, i) =>
          i === parts.length - 1
            ? `<span class="bc-current">${p.replace(/-/g, " ")}</span>`
            : `<span class="bc-item">${p.replace(/-/g, " ")}</span><span class="bc-sep">/</span>`
        ).join("");

        // Set page title
        document.title = `${fm.title || "Post"} — ahadiwasti`;

        // Inject breadcrumb + content
        document.getElementById("post-content").innerHTML = `
          <div class="post-breadcrumb">${breadcrumb}</div>
          <div class="post-dates">
            <span>Published ${fm.created_at}</span>
            ${fm.updated_at && fm.updated_at !== fm.created_at
              ? `<span class="updated">· Updated ${fm.updated_at}</span>`
              : ""}
          </div>
          <div class="post-body">${marked.parse(content)}</div>
        `;
      })
      .catch(() => {
        document.getElementById("post-content").innerHTML = "<p>Post not found.</p>";
      });
  }

  </script>
</body>
</html>
