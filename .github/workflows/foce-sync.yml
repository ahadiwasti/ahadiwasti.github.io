name: Full resync to portfolio

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Which repo to resync'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - DSA
          - System-Design
          - Software-Engineering
jobs:
  resync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: ahadiwasti/DSA
            category: DSA
          - repo: ahadiwasti/System-Design
            category: System-Design
          - repo: ahadiwasti/Software-Engineering
            category: Software-Engineering
    steps:
      - name: Checkout source repo
        if: ${{ github.event.inputs.repo == 'all' || github.event.inputs.repo == matrix.category }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.PORTFOLIO_TOKEN }}
          path: source

      - name: Checkout portfolio repo
        if: ${{ github.event.inputs.repo == 'all' || github.event.inputs.repo == matrix.category }}
        uses: actions/checkout@v4
        with:
          repository: ahadiwasti/ahadiwasti.github.io
          token: ${{ secrets.PORTFOLIO_TOKEN }}
          path: portfolio

      - name: Clear and resync all posts
        if: ${{ github.event.inputs.repo == 'all' || github.event.inputs.repo == matrix.category }}
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: |
          REPO_CATEGORY="${{ matrix.category }}"
          REPO="${{ matrix.repo }}"

          echo "=== Resyncing $REPO_CATEGORY ==="

          rm -rf portfolio/blog/posts/$REPO_CATEGORY
          mkdir -p portfolio/blog/posts/$REPO_CATEGORY

          find source -name "README.md" | grep -v "source/.github" | grep -v "^source/README.md$" | while read file; do
            RELATIVE=$(echo "$file" | sed 's|source/||' | sed 's|/README.md||')
            DEPTH=$(echo "$RELATIVE" | tr '/' '\n' | wc -l)
            TITLE=$(echo "$RELATIVE" | awk -F'/' '{print $NF}')

            if [ "$DEPTH" -eq 1 ]; then
              SUBCATEGORY=""
              BREADCRUMB=""
            elif [ "$DEPTH" -eq 2 ]; then
              SUBCATEGORY=$(echo "$RELATIVE" | cut -d'/' -f1)
              BREADCRUMB=""
            else
              SUBCATEGORY=$(echo "$RELATIVE" | cut -d'/' -f1)
              BREADCRUMB=$(echo "$RELATIVE" | cut -d'/' -f2-$((DEPTH-1)))
            fi

            echo "Processing: $RELATIVE | Subcategory: $SUBCATEGORY | Breadcrumb: $BREADCRUMB"

            if grep -q "publish: false" "$file" 2>/dev/null; then
              echo "Skipping $RELATIVE (publish: false)"
              continue
            fi

            DATES=$(python3 source/scripts/get-commit-dates.py "$REPO" "$RELATIVE" "$GH_TOKEN")
            FIRST_DATE=$(echo $DATES | cut -d',' -f1)
            LAST_DATE=$(echo $DATES | cut -d',' -f2)

            FILENAME=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')

            OUTPUT_DIR="portfolio/blog/posts/$REPO_CATEGORY"
            if [ ! -z "$SUBCATEGORY" ]; then
              OUTPUT_DIR="$OUTPUT_DIR/$SUBCATEGORY"
            fi
            mkdir -p "$OUTPUT_DIR"

            {
              echo "---"
              echo "title: $(echo $TITLE | sed 's/-/ /g')"
              echo "created_at: $FIRST_DATE"
              echo "updated_at: $LAST_DATE"
              echo "category: $REPO_CATEGORY"
              if [ ! -z "$SUBCATEGORY" ]; then
                echo "subcategory: $SUBCATEGORY"
              fi
              if [ ! -z "$BREADCRUMB" ]; then
                echo "breadcrumb: $BREADCRUMB"
              fi
              echo "---"
              echo ""
              cat "$file"
            } > "$OUTPUT_DIR/$FIRST_DATE-$FILENAME.md"

            echo "Synced: $TITLE → $OUTPUT_DIR/$FIRST_DATE-$FILENAME.md"
          done

      - name: Commit and push
        if: ${{ github.event.inputs.repo == 'all' || github.event.inputs.repo == matrix.category }}
        run: |
          cd portfolio
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blog/posts/
          git diff --staged --quiet || git commit -m "full resync: ${{ matrix.category }} posts"
          git push